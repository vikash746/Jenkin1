services:
  frontend:
    image: nginx:latest
    container_name: frontend-nginx
    ports:
      - "8082:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build: .
    container_name: backend-python
    ports:
      - "8081:5000"
    volumes:
      - .:/app
    networks:
      - app-network

networks:
  app-network:
    driver: bridge